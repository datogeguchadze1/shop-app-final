<nav class="navbar">
      <div class="nav-inner">
        <a routerLink="/" class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">LUXE</span>
        </a>

        <div class="search-bar" [class.open]="searchOpen()">
          <input
            #searchInput
            type="text"
            placeholder="Search products…"
            [(ngModel)]="searchQuery"
            (keyup.enter)="doSearch()"
          />
          <button class="search-submit" (click)="doSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>

        <div class="nav-actions">
          <button class="icon-btn mobile-search" (click)="searchOpen.set(!searchOpen())">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>

          <a routerLink="/favorites" class="icon-btn" title="Favorites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </a>

          <a routerLink="/cart" class="icon-btn cart-link" title="Cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="cart-badge" *ngIf="cartService.cartCount() > 0">{{ cartService.cartCount() }}</span>
          </a>

          <ng-container *ngIf="auth.isLoggedIn(); else guestLinks">
            <a routerLink="/profile" class="icon-btn" title="Profile">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </a>
            <button class="btn-logout" (click)="auth.logout()">Logout</button>
          </ng-container>

          <ng-template #guestLinks>
            <a routerLink="/auth/login" class="btn-login">Login</a>
          </ng-template>

          <button class="menu-toggle" (click)="menuOpen.set(!menuOpen())">
            <span [class.open]="menuOpen()"></span>
          </button>
        </div>
      </div>

      <div class="mobile-menu" [class.open]="menuOpen()">
        <a routerLink="/products" (click)="menuOpen.set(false)">Products</a>
        <a routerLink="/cart" (click)="menuOpen.set(false)">Cart</a>
        <a routerLink="/favorites" (click)="menuOpen.set(false)">Favorites</a>
        <a routerLink="/profile" (click)="menuOpen.set(false)" *ngIf="auth.isLoggedIn()">Profile</a>
        <a routerLink="/auth/login" (click)="menuOpen.set(false)" *ngIf="!auth.isLoggedIn()">Login</a>
        <a routerLink="/auth/register" (click)="menuOpen.set(false)" *ngIf="!auth.isLoggedIn()">Register</a>
      </div>
    </nav>
